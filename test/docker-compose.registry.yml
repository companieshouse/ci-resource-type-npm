services:
  registry:
    image: verdaccio/verdaccio:5
    container_name: npm-res-test-registry
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
    ports:
      - "4873:4873"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4873/-/ping"]
      interval: 5s
      timeout: 3s
      retries: 30
